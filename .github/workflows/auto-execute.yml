name: Auto Execute Payroll

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm init -y && npm install viem
      - name: Run auto-execute
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          RECORD_SECRET: ${{ secrets.RECORD_SECRET }}
        run: node auto-execute.mjs
